repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [click, networkx, gitpython, jinja2, rich, astroid]

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest (quick smoke test)
        entry: pytest -x -q --no-header --tb=line tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: cia-self-analysis
        name: CIA self-analysis
        entry: cia analyze . --format json
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
