[tox]
envlist = py311, py312, py313, lint, typecheck
isolated_build = true

[testenv]
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs}

[testenv:lint]
deps =
    black
    ruff
commands =
    black --check src/ tests/
    ruff check src/ tests/

[testenv:typecheck]
deps =
    mypy
    click
    networkx
    gitpython
    jinja2
    rich
    astroid
commands =
    mypy src/cia/

[testenv:format]
deps =
    black
    ruff
commands =
    black src/ tests/
    ruff check --fix src/ tests/
