[tox]
envlist = py311, py312, lint, typecheck
isolated_build = true

[testenv]
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=src/cia --cov-report=term-missing --cov-fail-under=70 {posargs}

[testenv:lint]
deps =
    black
    ruff
commands =
    black --check src/ tests/
    ruff check src/ tests/

[testenv:typecheck]
deps =
    mypy
    click
    networkx
    gitpython
    jinja2
    rich
    astroid
commands =
    mypy src/cia/

[testenv:format]
deps =
    black
    ruff
commands =
    black src/ tests/
    ruff check --fix src/ tests/

[testenv:docs]
deps =
    sphinx
    sphinx-rtd-theme
    myst-parser
commands =
    sphinx-build -W -b html docs/ docs/_build/html {posargs}

[testenv:all]
deps =
    {[testenv]deps}
    {[testenv:lint]deps}
    {[testenv:typecheck]deps}
commands =
    {[testenv:lint]commands}
    {[testenv:typecheck]commands}
    {[testenv]commands}
