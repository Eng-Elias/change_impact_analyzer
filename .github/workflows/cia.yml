name: CIA Self-Analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    name: Change Impact Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CIA
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run CIA analysis
        id: cia
        run: |
          set +e

          # Generate JSON report for threshold checking
          cia analyze . --format json --commit-range "origin/main..HEAD" \
            --threshold 75 > cia_report.json 2>&1
          CIA_EXIT=$?

          # Generate Markdown report for PR comment
          cia analyze . --format markdown --commit-range "origin/main..HEAD" \
            --explain > cia_report.md 2>&1

          # Read the markdown report
          REPORT=$(cat cia_report.md)

          # Build the PR comment body
          {
            echo "body<<EOF"
            echo "## 🔍 Change Impact Analysis"
            echo ""
            if [ $CIA_EXIT -eq 1 ]; then
              echo "> ⚠️ **High-risk changes detected.** Review recommended before merging."
              echo ""
            fi
            echo "$REPORT"
            echo ""
            echo "---"
            echo "*Generated by [Change Impact Analyzer](https://github.com/Eng-Elias/change_impact_analyzer)*"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "exit_code=$CIA_EXIT" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cia-report
          message: ${{ steps.cia.outputs.body }}

      - name: Check risk threshold
        if: steps.cia.outputs.exit_code == '1'
        run: |
          echo "::error::CIA detected high-risk changes (exit code 1). Review the analysis report."
          exit 1
